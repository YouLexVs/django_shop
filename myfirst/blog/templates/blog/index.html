{% extends "blog/base.html" %}

{% block content %}
<div class="container my-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Blog / Sklep</h1>
        <!-- <a href="/new/" class="btn btn-success">Dodaj post</a> -->
    </div>
    <div class="row">
        {% for post in posts %}
        <div class="col-md-4 mb-4">
            <div class="card h-100 shadow-sm">
                {% if post.image %}
                <img src="{{ post.image.url }}" class="card-img-top" alt="{{ post.name }}">
                {% endif %}
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">{{ post.name }}</h5>
                    <p class="card-text">{{ post.short_description }}</p>
                    <div class="mt-auto">
                        <a href="/{{ post.id }}/" class="btn btn-primary btn-sm me-2">Szczegóły</a>
                        <!-- <a href="/{{ post.id }}/edit/" class="btn btn-warning btn-sm me-2">Edytuj</a>
                        <a href="/{{ post.id }}/delete/" class="btn btn-danger btn-sm">Usuń</a> -->
                    </div>
                </div>
            </div>
        </div>
        {% empty %}
        <div class="col-12">
            <div class="alert alert-info">Brak postów do wyświetlenia.</div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
